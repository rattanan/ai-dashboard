services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ai_dashboard
      POSTGRES_USER: ai_dashboard
      POSTGRES_PASSWORD: ai_dashboard
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_dashboard -d ai_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes: ["postgres-data:/var/lib/postgresql/data"]
  mysql-fixture:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: analytics_fixture
      MYSQL_USER: readonly_user
      MYSQL_PASSWORD: readonly_password
      MYSQL_ROOT_PASSWORD: root_password
    ports: ["3306:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
      - mysql-data:/var/lib/mysql
  app:
    profiles: ["app"]
    build: .
    environment:
      DATABASE_URL: postgresql://ai_dashboard:ai_dashboard@postgres:5432/ai_dashboard?schema=public
      AUTH_SECRET: local-docker-auth-secret-change-in-production
      CREDENTIAL_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_URL: http://localhost:8080
      OBJECT_STORAGE_DRIVER: local
      LOCAL_STORAGE_PATH: /app/.data/uploads
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
volumes:
  postgres-data:
  mysql-data:
